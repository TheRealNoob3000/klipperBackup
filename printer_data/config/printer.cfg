# This file contains pin mappings for the Creality CR-20 Pro. To use
# this config, the firmware should be compiled for the AVR atmega2560.

# See docs/Config_Reference.md for a description of parameters.
[include mainsail.cfg]
[include macros.cfg]
[include timelapse.cfg]

[stepper_x]
step_pin: PF0
dir_pin: PF1
enable_pin: !PD7
microsteps: 16
rotation_distance: 40
endstop_pin: ^PE5
position_endstop: -16
position_max: 230
homing_speed: 65
position_min: -16

[stepper_y]
step_pin: PF6
dir_pin: PF7
enable_pin: !PF2
microsteps: 16
rotation_distance: 40
endstop_pin: ^PJ1
position_endstop: -23
position_max: 222
homing_speed: 65
position_min: -23

[stepper_z]
step_pin: PL3
dir_pin: !PL1
enable_pin: !PK0
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_max: 250
homing_speed: 10.0
position_min: -6.0

[extruder]
step_pin: PA4
dir_pin: !PA6
enable_pin: !PA2
microsteps: 16
rotation_distance: 3.464
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PB4
sensor_type: Generic 3950
sensor_pin: PK5
# --- WICHTIG: Die Sicherheitsschwelle ---
min_extrude_temp: 170
max_extrude_cross_section: 1.0
max_extrude_only_distance: 100
# ---
min_temp: 0
max_temp: 270
# pressure_advance: 0.0

[bltouch]
sensor_pin: ^PD3
control_pin: PB5
#z_offset: 0
x_offset: 36
y_offset: -37.5
speed: 3.0
samples: 3

[safe_z_home]
home_xy_position: 114, 114   # Fährt die Nozzle exakt in die Mitte des Bettes
speed: 50.0                  # Angenehmes, sicheres Fahrtempo
z_hop: 10                    # Hebt die Düse vor dem Fahren 10mm an (Sicherheit!)
z_hop_speed: 5.0

[bed_mesh]
speed: 120
horizontal_move_z: 8
mesh_min: 20, 8.5             ;(Nozzle Position, sodass die probe die Pos. auch erreichen kann)
mesh_max: 191, 184.5
probe_count: 7, 7
#mesh_pps: 2,2
fade_start: 1
fade_end: 10
algorithm: bicubic

[heater_bed]
heater_pin: PH5
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PK6
#control: pid
#pid_Kp: 690.34
#pid_Ki: 111.47
#pid_Kd: 1068.83
min_temp: 0
max_temp: 130

[fan]
pin: PH6

[mcu]
serial: /dev/serial/by-id/usb-FTDI_FT232R_USB_UART_AG0JSOV7-if00-port0

[printer]
kinematics: cartesian
max_velocity: 250
max_accel: 2900
max_z_velocity: 5
max_z_accel: 100

[pause_resume]
[display_status]

# [exclude_object]

[display]
lcd_type: uc1701
cs_pin: PA3
a0_pin: PA5
encoder_pins: ^PC4, ^PC6
click_pin: ^!PC2

# [bed_screws]
# screw1: 30,30
# screw2: 201,30
# screw3: 201,186
# screw4: 30,186

[screws_tilt_adjust]
screw1: -6, 221
screw1_name: hinten links (Basis)

screw2: -6, 68
screw2_name: vorne links

screw3: 165, 68
screw3_name: vorne rechts

screw4: 165, 221
screw4_name: hinten rechts

horizontal_move_z: 10
speed: 100
screw_thread: CW-M4

# x_offset: 36
# y_offset: -35

[mcu rpi]
serial: /tmp/klipper_host_mcu

[adxl345]
cs_pin: rpi:None

[resonance_tester]
accel_chip: adxl345
probe_points:
    115, 115, 20 

[input_shaper]
shaper_freq_x: 62.0
shaper_type_x: mzv
shaper_freq_y: 31.2
shaper_type_y: mzv

[output_pin unload_am_ende]
pin: PA0      # Ein freier Pin auf dem Mainboard
pwm: False
value: 0

[idle_timeout]
timeout: 3600 # Setzt den Timeout auf 1 Stunde (in Sekunden)

