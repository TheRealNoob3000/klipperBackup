[gcode_macro START_PRINT]
gcode:
    M117 Checke Pos.
    # --- PARAMETER EMPFANGEN ---
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}

    # --- SETUP ---
    G21                         ; Millimeter
    G90                         ; Absolute Positionierung
    M220 S100                   ; Speed Reset
    M221 S100                   ; Flow Reset
    G92 E0                      ; Extruder nullen
    M83                         ; Relative Extrusion

    # --- HEIZSTRATEGIE ---
    M140 S50          ; Bett starten
    M104 S180                   ; Düse nur vorheizen (Anti-Oozing)

    # --- HOMING ---
    G28                         ; Home

    G1 X-14 Y221 Z15 F5000       ; Parken weg vom Druckbereich
    M117 Bed heizen
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM=50            ; Warten auf Bett

    M117 Leveling
    G28 Z                       ; Z homing
    BED_MESH_CLEAR              ; Status sicherheitshalber nullen
    BED_MESH_PROFILE LOAD=default  ; defaul Mesh laden
    M140 S{BED_TEMP}            ; Bed auf ziel temperatur aufheizen
    
    # (Tipp: Wenn du vor JEDEM Druck ein komplett frisches Mesh 
    # messen willst, lösche die Zeile oben und schreibe stattdessen:
    # BED_MESH_CALIBRATE)

    # Erst auf eine "Sicherheits-Temperatur" heizen, die Bewegung erlaubt
    # M117 Warte auf Temps...
    # TEMPERATURE_WAIT SENSOR=extruder MINIMUM=180                   ; Warten bis 180°C (Extrudieren ist jetzt erlaubt)
    M117 Nozzle Heiz.

    
    M104 S{EXTRUDER_TEMP}       ; Extruder auf finale Temperatur stellen

    # G1 E-5 F1500                ; Jetzt Filament 3mm zurückziehen (Anti-Oozing)
    G1 X-5 Y5 Z10 F5000         ;Nozzle zum blob fahren
    # Jetzt erst auf die eigentliche Zieltemperatur (z.B. 225°C)
    M117 warte auf Temps
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={EXTRUDER_TEMP|float - 5}       ; Warten auf volle Drucktemperatur
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={BED_TEMP|float - 5}       ; Warten auf volle bed-temperatur
    M117 Rotze weg
    
    G1 E5 F1500                 ; Filament vor schieben
    G92 E0                      ; Nullen

    # =========================================================
    # ========== OPTIMIERTER PRIME BLOCK ==================
    # =========================================================

    G1 Z0.4 F600
    
    G92 E0
    
    ; --- Oozing lösen ---
    G1 E5 F300
    G1 X20 F2000
    G1 Y5 F2000   ; kleiner Zusatzwipe
    
    ; --- Prime ---
    G92 E0
    G1 X5 Y10
    G1 Z0.24 F600
    G1 Y50 E4 F1400
    
    ; sauber beenden
    G1 E-0.5 F3000
    G1 Z5 F600
    G1 X10 Y10 F1400
    
    G92 E0
    
    M117 LET'S GOOOOO

[gcode_macro END_PRINT]
gcode:
    # --- Drucker-Höhe live auslesen (Klipper-Logik) ---
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set act_z = printer.toolhead.position.z|float %}

    # --- Druck-Abschluss ---
    M400                           ; Warte, bis alle Bewegungen abgeschlossen sind
    G92 E0                         ; Extruder Reset

    # --- Düse aus (verhindert Oozing/Nachlaufen) ---
    M104 S0 

    # --- Der geniale Wipe/Hop/Retract-Move ---
    G91                            ; Relativer Modus
    G1 X-2 Y-2 Z2 E-5 F3000        ; Diagonal wischen, 2mm anheben, 5mm Retract

    # --- Parkposition anfahren ---
    G90                            ; WICHTIG: Zurueck zu Absolut VOR dem Parken!
    G1 X5 Y210 F5000               ; Kopf an die Seite, Bett weit nach vorne schieben

    # ---------------------------------------------------------
    # ABFRAGE FÜR DEN SCHALTER
    # ---------------------------------------------------------
    # Wir prüfen den Fake-Pin aus der printer.cfg
    {% if printer['output_pin unload_am_ende'].value > 0 %}
        M117 Entlade Fil.
        G91                        ; Kurz auf Relativ schalten für den Extruder
        G1 E-20 F600               ; Der Rest mit normalem Tempo hinterher
        G90                        ; Wieder zurück auf Absolut für den Z-Drop!
    {% else %}
        M117 Fil. bleibt
    {% endif %}
    # ---------------------------------------------------------

    # --- Dynamischer Z-Drop (Bett ablassen) ---
    # Klipper prüft: Haben wir noch 70mm Platz nach unten? 
    {% if act_z < (max_z - 70.0) %}
        G1 Z{act_z + 70.0} F600
    # Wenn nicht, haben wir zumindest noch 10mm Platz?
    {% elif act_z < (max_z - 10.0) %}
        G1 Z{max_z - 10.0} F600
    {% endif %}

    # --- Rest abschalten ---
    M140 S0                        ; Bett aus
    M106 S0                        ; Bauteillüfter aus
    M84 X Y E                      ; Motoren deaktivieren (Z bleibt an, damit nichts absackt)
    
    M117 Druck fertig!

[gcode_macro UNLOAD_FILAMENT]
description: Zieht das Filament sicher aus dem Extruder
gcode:
    {% set TEMP = params.TEMP|default(200)|float %}
    
    # 1. Prüfen, ob die Düse heiß genug ist (sonst aufheizen)
    {% if printer.extruder.temperature < TEMP %}
        M117 Heize auf {TEMP}
        M104 S{TEMP}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={TEMP}
    {% endif %}
    
    M117 Entlade Fil.
    G91                       ; Relative Positionierung
    G1 E5 F300                ; Kurz vorschieben, um den Pfropfen zu schmelzen
    G1 E-10 F3000             ; Ruckartig aus der heißen Zone (Heatbreak) ziehen
    G1 E-20 F600              ; Rest gemütlich aus den Zahnrädern ziehen
    G90                       ; Absolute Positionierung
    
    M117 Fil. entladen!

[gcode_macro LOAD_FILAMENT]
description: Lädt neues Filament und spült die alte Farbe raus
gcode:
    {% set TEMP = params.TEMP|default(200)|float %}
    
    # 1. Prüfen, ob die Düse heiß genug ist (sonst aufheizen)
    {% if printer.extruder.temperature < TEMP %}
        M117 Heize auf {TEMP}
        M104 S{TEMP}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={TEMP}
    {% endif %}
    
    M117 Lade Fil.
    G91                       ; Relative Positionierung
    G1 E30 F300               ; Langsam durch die Düse pressen (Purge / Farbwechsel)
    G1 E-3 F600               ; Kurzer Retract, damit es nicht endlos sabbert
    G90                       ; Absolute Positionierung
    
    M117 Fil. geladen!

#####################################################################
# Smart Power Logic (Modus-Durchschaltung)
#####################################################################

# 1. Das Haupt-Makro (Zustandsautomat)
[gcode_macro SMART_POWER_BUTTON]
variable_shutdown_mode: 0     # 0 = Aus, 1 = Drucker, 2 = Drucker & Pi
variable_led_state: 0         # Merkt sich für das Blinken, ob die LED an oder aus ist
gcode:
  {% set mode = printer["gcode_macro SMART_POWER_BUTTON"].shutdown_mode %}

  {% if mode == 0 %}
    # === WECHSEL ZU MODUS 1 (NUR DRUCKER) ===
    SET_GCODE_VARIABLE MACRO=SMART_POWER_BUTTON VARIABLE=shutdown_mode VALUE=1
    SET_GCODE_VARIABLE MACRO=SMART_POWER_BUTTON VARIABLE=led_state VALUE=0
    UPDATE_DELAYED_GCODE ID=led_blinker DURATION=0.8
    M117 Drucker Off...
    {action_respond_info("Modus 1 aktiv: Drucker wird nach Abkuehlen abgeschaltet.")}
    
    # 1 SEKUNDE PUFFER: Startet die Temperatur-Abfrage leicht verzögert
    UPDATE_DELAYED_GCODE ID=wait_for_temp DURATION=1.0

  {% elif mode == 1 %}
    # === WECHSEL ZU MODUS 2 (DRUCKER & PI) ===
    SET_GCODE_VARIABLE MACRO=SMART_POWER_BUTTON VARIABLE=shutdown_mode VALUE=2
    UPDATE_DELAYED_GCODE ID=led_blinker DURATION=0.3
    M117 Pi Shutdown...
    {action_respond_info("Modus 2 aktiv: Pi & Drucker werden nach Abkuehlen abgeschaltet.")}
    # Der Timer für die Temp-Prüfung läuft durch Klick 1 bereits im Hintergrund.

  {% else %}
    # === WECHSEL ZU MODUS 0 (ABBRUCH) ===
    SET_GCODE_VARIABLE MACRO=SMART_POWER_BUTTON VARIABLE=shutdown_mode VALUE=0
    UPDATE_DELAYED_GCODE ID=led_blinker DURATION=0
    UPDATE_DELAYED_GCODE ID=wait_for_temp DURATION=0
    {action_call_remote_method("set_device_power", device="status_led", state="off")}
    M117 Abbruch!
    {action_respond_info("Shutdown durch Taster abgebrochen.")}
  {% endif %}


# 2. Der Blinker-Taktgeber 
[delayed_gcode led_blinker]
gcode:
  {% set mode = printer["gcode_macro SMART_POWER_BUTTON"].shutdown_mode %}
  {% set current_state = printer["gcode_macro SMART_POWER_BUTTON"].led_state %}
  
  # Sicherheits-Check: Nur blinken, wenn ein Shutdown aktiv ist
  {% if mode > 0 %}
    {% if current_state == 0 %}
      {action_call_remote_method("set_device_power", device="status_led", state="on")}
      SET_GCODE_VARIABLE MACRO=SMART_POWER_BUTTON VARIABLE=led_state VALUE=1
    {% else %}
      {action_call_remote_method("set_device_power", device="status_led", state="off")}
      SET_GCODE_VARIABLE MACRO=SMART_POWER_BUTTON VARIABLE=led_state VALUE=0
    {% endif %}
    
    # Blinker-Schleife neu anstossen basierend auf dem Modus
    {% if mode == 1 %}
      UPDATE_DELAYED_GCODE ID=led_blinker DURATION=0.8
    {% elif mode == 2 %}
      UPDATE_DELAYED_GCODE ID=led_blinker DURATION=0.3
    {% endif %}
  {% endif %}


# 3. Die Überwachungs-Schleife (Temperatur & Druck-Status)
[gcode_macro TEMPERATURE_WAIT_AND_OFF]
gcode:
  {% set mode = printer["gcode_macro SMART_POWER_BUTTON"].shutdown_mode %}

  # Nur ausfuehren, wenn nicht mittlerweile abgebrochen wurde
  {% if mode > 0 %}
    {% if printer.print_stats.state == "printing" or printer.print_stats.state == "paused" %}
      M117 Warte a. Ende
      UPDATE_DELAYED_GCODE ID=wait_for_temp DURATION=10
      
    {% elif printer.extruder.temperature > 50 %}
      M117 Hotend kuehlt
      UPDATE_DELAYED_GCODE ID=wait_for_temp DURATION=10
      
    {% else %}
      # === FINALE AUSSCHALTUNG ===
      M117 Power Off!
      
      # 1. Alle Timer stoppen und Modus resetten
      SET_GCODE_VARIABLE MACRO=SMART_POWER_BUTTON VARIABLE=shutdown_mode VALUE=0
      UPDATE_DELAYED_GCODE ID=led_blinker DURATION=0
      
      # 2. LED aus und kurz warten
      {action_call_remote_method("set_device_power", device="status_led", state="off")}
      G4 P1000
      
      # 3. PRÜFEN, WAS ABGESCHALTET WERDEN SOLL
      {% if mode == 1 %}
        # NUR DRUCKER AUS
        {action_call_remote_method("set_device_power", device="mein_drucker", state="off")}
      {% elif mode == 2 %}
        # NUR PI AUS (Relais bleibt unberührt)
        {action_call_remote_method("shutdown_machine")}
      {% endif %}

    {% endif %}
  {% endif %}

# 4. Der Wiederholungs-Timer für die Temperaturabfrage
[delayed_gcode wait_for_temp]
gcode:
  TEMPERATURE_WAIT_AND_OFF

# 5. Boot-Blinker (Signalisiert erfolgreiche Klipper-Verbindung)
[delayed_gcode boot_blinker]
initial_duration: 1.0  
gcode:
  {action_call_remote_method("set_device_power", device="status_led", state="off")}
  G4 P250   
  {action_call_remote_method("set_device_power", device="status_led", state="on")}
  G4 P250
  {action_call_remote_method("set_device_power", device="status_led", state="off")}
  G4 P250
  {action_call_remote_method("set_device_power", device="status_led", state="on")}
  G4 P250
  {action_call_remote_method("set_device_power", device="status_led", state="off")}
  M117 Drucker bereit!